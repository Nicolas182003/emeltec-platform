<div
  class="flex flex-col relative overflow-hidden transition-shadow"
  style="background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);"
>
  <!-- Top section -->
  <div class="flex justify-between items-start relative z-10" style="margin-bottom: 10px;">
    <div>
      <p style="font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #94A3B8; margin-bottom: 2px;">{{ title }}</p>
      <p style="font-size: 11px; color: #94A3B8;">{{ formattedTime }}</p>
    </div>
    <div class="flex items-center justify-center rounded-lg" style="width: 32px; height: 32px; background: rgba(13,175,189,0.08); border: 1px solid rgba(13,175,189,0.15); flex-shrink: 0;">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="#0DAFBD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
    </div>
  </div>

  <!-- Big Value -->
  <div class="flex items-baseline gap-1 relative z-10">
    <span style="font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700; color: #0DAFBD; letter-spacing: -0.02em; line-height: 1;">{{ displayValue }}</span>
    <span style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #94A3B8;">{{ unit }}</span>
  </div>

  <!-- Bottom -->
  <div class="flex items-center justify-between relative z-10" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #F1F5F9;">
    <span style="font-size: 10px; color: #94A3B8;">vs. anterior</span>
    <span class="flex items-center gap-1" style="font-size: 10px; font-weight: 600; color: #22C55E;">
      <span class="rounded-full" style="width: 6px; height: 6px; background: #22C55E; display: inline-block;"></span>
      Activo
    </span>
  </div>
</div>
