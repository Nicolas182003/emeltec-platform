<div class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
  <!-- Elementos decorativos de fondo -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
    <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-blue-100 opacity-60 blur-3xl"></div>
    <div class="absolute top-[60%] -right-[10%] w-[40%] h-[40%] rounded-full bg-emerald-50 opacity-60 blur-3xl"></div>
  </div>

  <div class="bg-white/80 backdrop-blur-xl border border-slate-200 rounded-2xl shadow-xl w-full max-w-md p-8 relative z-10">
    
    <!-- Header / Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/30 mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="text-white w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-800">Panel Industrial</h1>
      <p class="text-sm text-slate-500 mt-1">
        {{ isCodeSent() ? 'Ingresa el código que te enviamos' : 'Solicita tu código de acceso temporal' }}
      </p>
    </div>

    <!-- Mensajes de Alerta -->
    @if (errorMsg()) {
      <div class="bg-red-50 text-red-600 p-3 rounded-lg flex items-center gap-2 mb-6 text-sm font-medium border border-red-100 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p>{{ errorMsg() }}</p>
      </div>
    }

    @if (successMsg()) {
      <div class="bg-emerald-50 text-emerald-700 p-3 rounded-lg flex items-center gap-2 mb-6 text-sm font-medium border border-emerald-100 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p>{{ successMsg() }}</p>
      </div>
    }

    <!-- Formulario: Solicitar Código -->
    @if (!isCodeSent()) {
      <form (submit)="handleRequestCode($event)" class="space-y-5">
        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-slate-700">Correo Registrado</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            </div>
            <input
              type="email"
              required
              class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-colors outline-none text-slate-800"
              placeholder="ejemplo@empresa.com"
              [ngModel]="email()"
              (ngModelChange)="email.set($event)"
              name="email"
            />
          </div>
        </div>

        <button
          type="submit"
          [disabled]="isSubmitting()"
          [class]="'w-full py-2.5 rounded-xl text-white font-medium shadow-md transition-all flex justify-center items-center gap-2 ' + (isSubmitting() ? 'bg-blue-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-600/30 active:scale-[0.98]')"
        >
          @if (isSubmitting()) {
            <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          } @else {
            Recibir Código por Correo
          }
        </button>
        <div class="text-center mt-4">
          <button type="button" (click)="goToCodeEntry()" class="text-sm text-blue-600 hover:underline font-medium">Ya tengo un código</button>
        </div>
      </form>
    } @else {
      <!-- Formulario: Ingresar Código -->
      <form (submit)="handleLogin($event)" class="space-y-5">
        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-slate-700">Correo Electrónico</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            </div>
            <input
              type="email"
              required
              readonly
              class="w-full pl-10 pr-4 py-2.5 bg-slate-100 border border-slate-200 rounded-xl text-slate-500 cursor-not-allowed"
              [value]="email()"
            />
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-slate-700">Código de Acceso (6 Dígitos)</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <input
              type="text"
              required
              maxlength="6"
              class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-colors outline-none text-slate-800 text-center font-mono text-xl tracking-widest"
              placeholder="------"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              name="password"
            />
          </div>
        </div>

        <button
          type="submit"
          [disabled]="isSubmitting()"
          [class]="'w-full py-3 rounded-xl text-white font-medium shadow-md transition-all flex justify-center items-center gap-2 ' + (isSubmitting() ? 'bg-blue-400 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-700 hover:shadow-lg hover:shadow-emerald-600/30 active:scale-[0.98]')"
        >
          @if (isSubmitting()) {
            <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          } @else {
            Iniciar Sesión Segura
          }
        </button>
        <div class="text-center mt-4">
          <button type="button" (click)="goBack()" class="text-sm text-slate-500 hover:underline font-medium">Volver atrás (Solicitar otro código)</button>
        </div>
      </form>
    }

    <div class="mt-8 text-center">
      <p class="text-xs text-slate-400">Protegido por Sistema de Roles. Solo personal autorizado.</p>
    </div>

  </div>
</div>
